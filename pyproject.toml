[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "pesquisai"
version = "1.0"
description = "Agente de IA para Pesquisa Científica com foco em dados brasileiros"
authors = [{ name = "Gustavo Bastos Braga", email = "gustavo.braga@ufv.br" }]
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "google-api-python-client",
    "google-auth-httplib2",
    "google-auth-oauthlib",
]

[project.urls]
Repository = "https://github.com/gustavobraga-byte/PesquisAI"
