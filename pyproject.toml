[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "pesquisai"
version = "0.2.3"
description = "Agente de IA para Pesquisa Científica com foco em dados brasileiros"
authors = [{ name = "Gustavo Bastos Braga", email = "gustavo.braga@ufv.br" }]
license = { text = "MIT" }
requires-python = ">=3.10"
readme = "README.md"

dependencies = [
    "google-api-python-client",
    "google-auth-httplib2",
    "google-auth-oauthlib",
    "cryptography>=41.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "mypy>=1.10",
]
test = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]
crypto = [
    "pycryptodome>=3.20",
]

[project.urls]
Repository = "https://github.com/gustavobraga-byte/PesquisAI"
Documentation = "https://github.com/gustavobraga-byte/PesquisAI/blob/main/MANUAL.md"
Changelog = "https://github.com/gustavobraga-byte/PesquisAI/blob/main/CHANGELOG.md"

# ── Ruff (linter e formatter) ──────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "SIM"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

# ── Mypy (type checker) ────────────────────────────────────
[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
disallow_untyped_defs = false
warn_unused_configs = true

# ── Pytest ─────────────────────────────────────────────────
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --cov=pesquisai --cov-report=term-missing"

# ── Hatchling build ────────────────────────────────────────
[tool.hatch.build]
include = [
    "pesquisai/**",
    "main.py",
    "CHANGELOG.md",
    "SECURITY.md",
    "README.md",
    "LICENSE",
    "AGENTS.md",
    "MANUAL.md",
    "pyproject.toml",
]

[tool.hatch.build.targets.wheel]
packages = ["pesquisai"]
