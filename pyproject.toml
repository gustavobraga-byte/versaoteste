[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "pesquisai"
version = "1.0"
description = "Agente de IA para Pesquisa Científica com foco em dados brasileiros"
authors = [{ name = "Gustavo Bastos Braga", email = "gustavo.braga@ufv.br" }]
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "google-api-python-client>=2.0,<3.0",
    "google-auth-httplib2>=0.2,<1.0",
    "google-auth-oauthlib>=1.0,<2.0",
]

[project.urls]
Repository = "https://github.com/gustavobraga-byte/PesquisAI"

[tool.pytest.ini_options]
testpaths = ["tests"]
